# Architecture policy manifest — reviewed input for CI boundary lint.
# This is not runtime configuration and must not contain credentials or mutable state.
# Paths are language-neutral module areas (no assumed source-file extension yet).
version: 1

public_surfaces:
  - packages/*/src
  - packages/core/src/events
  - packages/core/events
  - modules/*/application
  - modules/*/agent-tools

rules:
  # Delivery hosts only talk to the composition root.
  - from: apps/api
    may_import: [apps/composition]
  - from: apps/worker
    may_import: [apps/composition]
  # Sole composition root: package entrypoints + module public surfaces only.
  - from: apps/composition
    may_import:
      - packages/*
      - modules/*/application
      - modules/*/agent-tools
  - from: packages/agent-kernel/application
    may_import:
      - packages/agent-kernel/contracts
      - packages/agent-kernel/ports
      - packages/shared-*
  - from: packages/agent-kernel/contracts
    forbidden: [packages/runtime-*, modules/*, vendor-framework-types]
  - from: packages/agent-kernel/ports
    forbidden: [packages/runtime-*, modules/*, vendor-framework-types]
  - from: packages/runtime-*
    may_import:
      - packages/agent-kernel/contracts
      - packages/agent-kernel/ports
      - packages/shared-*
    forbidden: [modules/*]
  # Modules emit via core/events public surface only — not packages/core internals.
  - from: modules/*
    may_import:
      - packages/agent-kernel/contracts
      - packages/shared-*
      - packages/core/events
      - packages/core/src/events
    forbidden: [packages/runtime-*, apps/*]
  - from: packages/core
    may_import: [packages/shared-db, packages/shared-orchestration, packages/shared-*]
    forbidden: [modules/*]
  - from: packages/shared-*
    forbidden: [modules/*, packages/runtime-*]

required_checks:
  - public-surface-imports
  - forbidden-imports
  - no-cross-module-internals
  - schema-ownership
  - adapter-contract-tests

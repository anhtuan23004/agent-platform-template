name: Build platform images
description: |
  Multi-arch buildx for server and web images. Caller logs into the registry
  (FPT Container Registry or other) before invoking this action, or passes
  registry credentials via the login step below.

inputs:
  image:
    description: 'Logical image name (server or web) — for logs only'
    required: true
  dockerfile:
    description: 'Dockerfile path (relative to repo root)'
    required: true
  tags:
    description: 'Newline-separated list of full image refs to tag'
    required: true
  labels:
    description: 'Newline-separated list of OCI labels'
    required: false
    default: ''
  platforms:
    description: 'buildx platforms; default linux/amd64'
    required: false
    default: 'linux/amd64'
  push:
    description: '"true" to push; "false" to build only'
    required: false
    default: 'false'
  registry:
    description: 'Registry hostname (e.g. registry.fptcloud.com)'
    required: true
  registry-username:
    description: 'Registry username'
    required: true
  registry-password:
    description: 'Registry password / token'
    required: true
  cache-ref:
    description: 'Registry ref for build cache (e.g. registry/repo:buildcache-server)'
    required: true

outputs:
  digest:
    description: 'sha256 digest of the pushed image'
    value: ${{ steps.build.outputs.digest }}
  metadata:
    description: 'JSON metadata from build-push-action'
    value: ${{ steps.build.outputs.metadata }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Build and (maybe) push
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        cache-from: type=registry,ref=${{ inputs.cache-ref }}
        cache-to: type=registry,ref=${{ inputs.cache-ref }},mode=max
        provenance: false

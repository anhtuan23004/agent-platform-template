name: UAT — Rollback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to roll back to (e.g. v0.1.0 or 68134a1b09d6)'
        required: true

concurrency:
  group: uat-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY }}
  REPOSITORY: ${{ vars.REPOSITORY }}

jobs:
  rollback:
    name: Rollback to ${{ github.event.inputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: uat
    steps:
      - name: SSH rollback to Cloud Server
        uses: appleboy/ssh-action@v1.2.5
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPOSITORY: ${{ env.REPOSITORY }}
          IMAGE_TAG: ${{ github.event.inputs.tag }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ vars.UAT_HOST }}
          username: ${{ vars.UAT_USER || 'ubuntu' }}
          key: ${{ secrets.UAT_SSH_PRIVATE_KEY }}
          envs: REGISTRY,REPOSITORY,IMAGE_TAG,REGISTRY_USERNAME,REGISTRY_PASSWORD,GITHUB_REPO,GITHUB_REF_NAME
          script: |
            set -euo pipefail
            echo "=== Rolling back to tag: $IMAGE_TAG ==="

            echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" \
              -u "$REGISTRY_USERNAME" --password-stdin

            SERVER_IMAGE="$REGISTRY/$REPOSITORY:server-$IMAGE_TAG"
            WEB_IMAGE="$REGISTRY/$REPOSITORY:web-$IMAGE_TAG"

            # Verify images exist before touching running containers
            docker manifest inspect "$SERVER_IMAGE" >/dev/null
            docker manifest inspect "$WEB_IMAGE" >/dev/null

            sed -i "s|^PLATFORM_IMAGE_SERVER=.*|PLATFORM_IMAGE_SERVER=$SERVER_IMAGE|" /opt/platform/.env
            sed -i "s|^PLATFORM_IMAGE_WEB=.*|PLATFORM_IMAGE_WEB=$WEB_IMAGE|" /opt/platform/.env
            sed -i "s|^PLATFORM_VERSION=.*|PLATFORM_VERSION=$IMAGE_TAG|" /opt/platform/.env

            cd /opt/platform
            REPO_RAW="https://raw.githubusercontent.com/$GITHUB_REPO/$GITHUB_REF_NAME"
            curl -fsSL "$REPO_RAW/compose.yml" -o compose.yml

            docker compose --env-file /opt/platform/.env pull server web
            docker compose --env-file /opt/platform/.env up -d --no-deps --remove-orphans
            docker image prune -f

            echo "=== Rollback complete: $IMAGE_TAG ==="
